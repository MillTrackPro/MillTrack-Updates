name: Update latest_version.json

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, example: v2.0.9"
        required: true
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string
        default: "MillTrack PRO update"

permissions:
  contents: write

jobs:
  update-latest-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release info
        id: info
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            NOTES="${{ github.event.inputs.notes }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            NOTES="${{ github.event.release.name }}"
          fi

          VERSION="${TAG#v}"
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/MillTrack_PRO_Setup.exe"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Write latest_version.json
        shell: bash
        run: |
          cat > latest_version.json <<EOF
          {
            "version": "${{ steps.info.outputs.version }}",
            "installer_url": "${{ steps.info.outputs.asset_url }}",
            "notes": "${{ steps.info.outputs.notes }}"
          }
          EOF

          echo "Created latest_version.json:"
          cat latest_version.json

      - name: Commit latest_version.json
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add latest_version.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-update latest_version.json for ${{ steps.info.outputs.tag }}"
          git push
